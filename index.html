<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Colten's Bachelor Party — Choose Your Adventure</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --night:#0e1b17;
  --pine:#163026;
  --moss:#2b4a3c;
  --amber:#f5a623;
  --sky:#7fd1e8;
  --paper:#f3efe6;
  --ink:#0e1b17;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Space Grotesk',sans-serif;background:var(--night);color:var(--paper);min-height:100vh;overflow-x:hidden}
h1,h2,h3,.display{font-family:'Archivo Black',sans-serif;letter-spacing:.5px;text-transform:uppercase}

/* ---------- HERO ---------- */
header{padding:64px 24px 32px;text-align:center;position:relative}
.eyebrow{color:var(--amber);font-weight:700;letter-spacing:3px;text-transform:uppercase;font-size:.8rem;margin-bottom:12px}
h1{font-size:clamp(2.2rem,7vw,4.5rem);line-height:1.02}
h1 span{color:var(--sky)}
.sub{max-width:560px;margin:18px auto 0;color:#b9c7bf;font-size:1.05rem}
.dates{display:inline-block;margin-top:20px;border:2px dashed var(--amber);color:var(--amber);padding:8px 18px;border-radius:999px;font-weight:700;font-size:.9rem}

/* mountain divider */
.mountains{display:block;width:100%;height:70px;margin-top:24px}

/* ---------- CARDS ---------- */
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:24px;max-width:1150px;margin:0 auto;padding:8px 24px 80px}
.card{background:var(--pine);border-radius:18px;overflow:hidden;cursor:pointer;border:2px solid transparent;transition:transform .25s ease,border-color .25s ease,box-shadow .25s ease;position:relative}
.card:hover,.card:focus-visible{transform:translateY(-6px);border-color:var(--amber);box-shadow:0 18px 40px rgba(0,0,0,.45);outline:none}
.card .art{height:170px;position:relative;overflow:hidden}
.card .art svg{width:100%;height:100%;display:block}
.badge{position:absolute;top:14px;left:14px;background:var(--night);color:var(--amber);font-weight:700;font-size:.72rem;letter-spacing:2px;text-transform:uppercase;padding:6px 12px;border-radius:999px}
.card .body{padding:20px 22px 24px}
.card h2{font-size:1.45rem;margin-bottom:6px}
.card .tag{color:var(--sky);font-weight:500;font-size:.92rem;margin-bottom:14px}
.price{font-family:'Archivo Black';font-size:1.5rem;color:var(--amber)}
.price small{display:block;font-family:'Space Grotesk';font-weight:500;font-size:.75rem;color:#b9c7bf;text-transform:none;letter-spacing:0;margin-top:4px}
.cta{margin-top:16px;display:inline-flex;align-items:center;gap:8px;font-weight:700;color:var(--paper)}
.cta::after{content:"→";transition:transform .2s}
.card:hover .cta::after{transform:translateX(5px)}

/* ---------- DETAIL VIEW ---------- */
.detail{position:fixed;inset:0;background:var(--night);z-index:50;overflow-y:auto;transform:translateY(100%);transition:transform .45s cubic-bezier(.7,0,.2,1)}
.detail.open{transform:translateY(0)}
.detail-hero{position:relative;height:260px;overflow:hidden}
.detail-hero svg{width:100%;height:100%;display:block}
.back{position:fixed;top:18px;left:18px;z-index:60;background:var(--night);color:var(--paper);border:2px solid var(--amber);border-radius:999px;padding:10px 20px;font-family:'Space Grotesk';font-weight:700;cursor:pointer;font-size:.95rem}
.back:hover{background:var(--amber);color:var(--night)}
.detail-inner{max-width:820px;margin:-70px auto 0;padding:0 24px 90px;position:relative}
.detail-card{background:var(--pine);border-radius:20px;padding:34px 34px 40px;box-shadow:0 -12px 40px rgba(0,0,0,.5)}
.detail h2{font-size:clamp(1.8rem,5vw,2.8rem);margin-bottom:4px}
.detail .tag{color:var(--sky);font-size:1.05rem;margin-bottom:18px}
.pricebar{display:flex;flex-wrap:wrap;gap:14px;align-items:center;background:var(--night);border-radius:14px;padding:16px 20px;margin-bottom:30px}
.pricebar .price{font-size:1.7rem}
.pros{display:flex;gap:8px;flex-wrap:wrap;margin-left:auto}
.pro{background:var(--moss);color:var(--paper);font-size:.8rem;font-weight:700;padding:6px 12px;border-radius:999px}

.day{margin-bottom:30px}
.day h3{color:var(--amber);font-size:1.05rem;letter-spacing:2px;border-bottom:2px solid var(--moss);padding-bottom:8px;margin-bottom:14px}
.item{display:flex;gap:14px;margin-bottom:12px}
.dot{flex:0 0 10px;height:10px;border-radius:50%;background:var(--sky);margin-top:7px}
.item b{color:var(--paper)}
.item p{color:#c6d2ca;line-height:1.55}
.item .opts{color:#93a89d;font-size:.92rem;margin-top:2px}
.link{color:var(--sky);font-weight:700;text-decoration:none;border-bottom:2px solid var(--sky)}
.link:hover{color:var(--amber);border-color:var(--amber)}
.note{background:var(--moss);border-left:4px solid var(--amber);border-radius:8px;padding:12px 16px;color:#dde7df;font-size:.95rem;margin-bottom:26px}

@media (prefers-reduced-motion:reduce){*{transition:none!important}}
@media (max-width:600px){.detail-card{padding:24px 20px 32px}}
</style>
</head>

const grid = document.getElementById('grid');
options.forEach((o,i)=>{
  const c = document.createElement('div');
  c.className='card'; c.tabIndex=0; c.setAttribute('role','button');
  c.setAttribute('aria-label','View '+o.name+' details');
  c.innerHTML = `<div class="art">${o.art}<span class="badge">${o.badge}</span></div>
    <div class="body"><h2>${o.name}</h2><div class="tag">${o.tag}</div>
    <div class="price">${o.price}<small>rough estimate per person · low end skips the skydive</small></div>
    <span class="cta">See the plan</span></div>`;
  c.addEventListener('click',()=>openDetail(o));
  c.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();openDetail(o);}});
  grid.appendChild(c);
});

const detail=document.getElementById('detail'), content=document.getElementById('detailContent'), backBtn=document.getElementById('backBtn');
function openDetail(o){
  content.innerHTML = `<div class="detail-hero">${o.art}</div>
  <div class="detail-inner"><div class="detail-card">
    <h2>${o.name}</h2><div class="tag">${o.tag}</div>
    <div class="pricebar"><div class="price">${o.price}<small>rough estimate per person, group of 6</small></div>
      <div class="pros">${o.pros.map(p=>`<span class="pro">${p}</span>`).join('')}</div></div>
    <div class="note">${o.note}</div>
    ${o.days.map(d=>`<div class="day"><h3>${d.title}</h3>${d.items.map(it=>`
      <div class="item"><span class="dot"></span><div><b>${it.b}</b>${it.p?`<p>${it.p}</p>`:''}${it.o?`<div class="opts">Options: ${it.o}</div>`:''}</div></div>`).join('')}</div>`).join('')}
  </div></div>`;
  detail.classList.add('open'); backBtn.style.display='block';
  detail.scrollTop=0; document.body.style.overflow='hidden'; backBtn.focus();
}
function closeDetail(){detail.classList.remove('open');backBtn.style.display='none';document.body.style.overflow='';}
backBtn.addEventListener('click',closeDetail);
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeDetail();closeVotePage();}});
